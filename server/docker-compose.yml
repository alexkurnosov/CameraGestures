services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestures}
      POSTGRES_USER: ${POSTGRES_USER:-gestures}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestures}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      # Persist trained model files and update trigger across container restarts
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
