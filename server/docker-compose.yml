services:
  server:
    build: .
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      # Persist uploaded examples and trained models across container restarts
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
